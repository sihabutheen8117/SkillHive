<div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Course</th>
          <th>Created Date</th>
          <th>Schedule</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let course of courses">
          <td>{{course.title}}</td>
          <td>{{course.createdAt}}</td>
          <td>
            <button (click)="goToAssessment(course.courseId)" class="schedule-btn" >
                Create Assessment
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
